<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syncyt - Watch Together</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="logo">🎬 SYNCYT</h1>
            <div class="header-right">
                <button id="theme-toggle" class="theme-toggle">🌙 DARK</button>
                <div class="room-info">
                    <span id="room-id">🏠 NO ROOM</span>
                    <span id="user-count">👥 1</span>
                </div>
            </div>
        </header>

        <div class="main-content">
            <div class="video-section">
                <div id="player-container">
                    <div id="player"></div>
                </div>
                
                <div class="controls">
                    <input type="text" id="youtube-url" placeholder="🎥 PASTE YOUTUBE URL HERE..." />
                    <button id="load-video">🚀 LOAD</button>
                </div>
            </div>

            <div class="chat-section">
                <div class="chat-header">💬 LIVE CHAT</div>
                <div id="chat-messages"></div>
                <div class="chat-input">
                    <input type="text" id="message-input" placeholder="💭 TYPE MESSAGE..." />
                    <button id="send-message">📤 SEND</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>MADE WITH ❤️ BY ARYAN</p>
    </footer>

    <div id="join-modal" class="modal">
        <div class="modal-content">
            <h2>🎉 JOIN SYNCYT</h2>
            <input type="text" id="room-input" placeholder="ENTER ROOM ID..." />
            <button id="join-room">🚪 JOIN ROOM</button>
            <button id="create-room">✨ CREATE NEW</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
